<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .menu-img {
        width: 50%;
        height: 250px;
        object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- bootstrap container class centers the content
     and provides responsive padding -->
    <div class="container">
        <!-- bootstrap row class creates a horizontal
          group of columns -->
        <div class="row">
            <!-- bootstrap col class creates column with equal width -->
            <div class="col">
                <h1>Out Menu</h1>
                <h2>Falafel</h2>
                <p>Chickpea, herbs and spices.</p>
                <!-- img-fluid makes the image responsive -->
                <img src="falafel.jfif" alt="A falafel" class="img-fluid menu-img">
                <h2>Pasta Salad</h2>
                <p>Lettuce, vegetables and mozzarella.</p>
                <img src="salad.jfif" alt="A pasta salad" class="img-fluid menu-img">
            </div>
            <div class="col">
                <h2>Prices</h2>
                <table class="table">
                    <tr>
                        <td>Falafel</td>
                        <td>$10.00</td>
                    </tr>
                    <tr>
                        <td>Pasta Salad</td>
                        <td>$12.00</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS Bundle (includes Popper for dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
