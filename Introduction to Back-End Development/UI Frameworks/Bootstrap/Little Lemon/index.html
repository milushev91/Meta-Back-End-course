<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .menu-img {
        width: 50%;
        height: 100px;
        object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- bootstrap container class centers the content
     and provides responsive padding -->
    <div class="container">
        <!-- bootstrap row class creates a horizontal
          group of columns -->
        <div class="row">
            <!-- bootstrap col class creates column with equal width -->
            <div class="col">
                <h1>Out Menu</h1>
                <div class="row">
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="calamari.jfif" alt="Fried calamari" class="card-img-top">
                            <div class="card-body">
                                <h2 class="card-title">Fried Calamari <span class="badge bg-primary">New</span></h2>
                                <p class="card-text">Squid, buttermilk.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-6">
                                                <div class="card">
                            <img src="falafel.jfif" alt="A falafel" class="card-img-top">
                            <div class="card-body">
                                <h2 class="card-title">Falafel</h2>
                                <p class="card-text">Chickpea, herbs and spices.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="card">
                            <img src="salad.jfif" alt="A pasta salad" class="card-img-bottom">
                            <div class="card-body">
                                <h2 class="card-title">Pasta Salad</h2>
                                <p class="card-text">Lettuce, vegetables and mozzarella.</p>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
            <div class="col">
                <h2>Prices</h2>
                <table class="table">
                    <tr>
                        <td>Fried Calamari</td>
                        <td>$12.00</td>
                    </tr>
                    <tr>
                        <td>Falafel</td>
                        <td>$10.00</td>
                    </tr>
                    <tr>
                        <td>Pasta Salad</td>
                        <td>$12.00</td>
                    </tr>
                </table>
                <div class="alert alert-info" role="alert">
                    Try out our new Fried Calamari!
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS Bundle (includes Popper for dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
